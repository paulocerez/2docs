version: "3.8"
services:
  db:
    container_name: 2docs-db
    image: postgres:14
    restart: always
    environment:
      POSTGRES_PASSWORD: 2docs
      POSTGRES_DB: 2docs
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: 2docs@2docs.com
      PGADMIN_DEFAULT_PASSWORD: 2docs
    ports:
      - "8080:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      - db

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      RUST_LOG: info

  firecrawl-api:
    build:
      context: https://github.com/FireCrawl/firecrawl.git
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:2docs@db:5432/2docs
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - db
      - qdrant

  nextjs-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:2docs@db:5432/2docs
      - QDRANT_URL=http://qdrant:6333
      - FIRECRAWL_API_URL=http://firecrawl-api:8000
    depends_on:
      - db
      - qdrant
      - firecrawl-api

volumes:
  db-data:
  pgadmin-data:
  qdrant-data:
