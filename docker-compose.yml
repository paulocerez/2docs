services:
  db:
    container_name: 2docs-db
    image: postgres:14
    restart: always
    environment:
      POSTGRES_PASSWORD: 2docs
      POSTGRES_DB: 2docs
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: 2docs@2docs.com
      PGADMIN_DEFAULT_PASSWORD: 2docs
    ports:
      - "8080:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      - db

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      RUST_LOG: info

volumes:
  db-data:
  pgadmin-data:
  qdrant-data:
